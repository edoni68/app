<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
  
<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  padding: 20px;
}

.project {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

.start { background: #34c759; color: white; }
.stop { background: #ff3b30; color: white; }
.active { outline: 3px solid #000; }

.small { font-size: 12px; color: gray; }
</style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>

<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<h2>🧑‍💻 Arbeitsmodus</h2>
<button onclick="startWork()" class="start">Start Arbeit</button>
<button onclick="pauseWork()">Pause</button>
<button onclick="stopWork()" class="stop">Feierabend</button>

<div id="workInfo"></div>

<script>

let projects;
try {
  projects = JSON.parse(localStorage.getItem("projects")) || [];
} catch (e) {
  projects = [];
}
  
let work;
try {
  work = JSON.parse(localStorage.getItem("work")) || {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
} catch (e) {
  work = {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
}
  
function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
  localStorage.setItem("work", JSON.stringify(work));
  render();
}

// ✅ Projekte

function addProject() {
  alert("button geht");
  let name = document.getElementById("projectInput").value;
  if (!name) return;

  projects.push({
    name,
    sessions: [],
    running: false,
    startTime: null
  });

  document.getElementById("projectInput").value = "";
  save();
}

function editProject(i) {
  let name = prompt("Neuer Name:", projects[i].name);
  if (name) {
    projects[i].name = name;
    save();
  }
}

function deleteProject(i) {
  if (!confirm("Wirklich löschen?")) return;
  projects.splice(i, 1);
  save();
}

// ✅ Timer

function stopAll() {
  projects.forEach(p => {
    if (p.running) {
      p.sessions.push({
        start: p.startTime,
        end: Date.now()
      });
      p.running = false;
      p.startTime = null;
    }
  });
}

function startTimer(i) {
  stopAll();

  let p = projects[i];
  p.running = true;
  p.startTime = Date.now();

  save();
}

function stopTimer(i) {
  let p = projects[i];
  if (!p.running) return;

  p.sessions.push({
    start: p.startTime,
    end: Date.now()
  });

  p.running = false;
  p.startTime = null;

  save();
}

// ✅ Arbeitsmodus

function startWork() {
  if (work.running) return;

  work.running = true;
  work.paused = false;
  work.start = Date.now();

  save();
}

function pauseWork() {
  if (!work.running) return;

  work.total += Date.now() - work.start;
  work.running = false;
  work.paused = true;

  save();
}

function stopWork() {
  if (work.running) {
    work.total += Date.now() - work.start;
  }

  work.running = false;
  work.paused = false;
  work.start = null;

  save();
}

// ✅ Helpers

function format(ms) {
  let sec = Math.floor(ms / 1000);
  let min = Math.floor(sec / 60);
  let h = Math.floor(min / 60);
  return `${h}h ${min % 60}m ${sec % 60}s`;
}

function formatTime(ts) {
  let d = new Date(ts);
  return d.toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getTotal(p) {
  let total = 0;

  p.sessions.forEach(s => {
    total += s.end - s.start;
  });

  if (p.running) {
    total += Date.now() - p.startTime;
  }

  return total;
}

// ✅ Render

function render() {
  let container = document.getElementById("projects");
  let workInfo = document.getElementById("workInfo");

  container.innerHTML = "";

  projects.forEach((p, i) => {
    let div = document.createElement("div");
    div.className = "project";

    let sessionsHtml = "";

    p.sessions.slice(-5).forEach(s => {
      sessionsHtml += `
        <div class="small">
          ${formatTime(s.start)} – ${formatTime(s.end)}
        </div>
      `;
    });

    let active = p.running ? "active" : "";

    div.innerHTML = `
      <strong>${p.name}</strong><br>
      Gesamt: ${format(getTotal(p))}<br>

      <button class="start ${active}" onclick="startTimer(${i})">Start</button>
      <button class="stop" onclick="stopTimer(${i})">Stop</button><br>

      ${sessionsHtml}

      <button onclick="editProject(${i})">✏️</button>
      <button onclick="deleteProject(${i})">🗑️</button>
    `;

    container.appendChild(div);
  });

  let total = work.total;

  if (work.running) {
    total += Date.now() - work.start;
  }

  workInfo.innerHTML = `Gesamt Arbeitszeit: ${format(total)}`;
}

// ✅ Start
setInterval(render, 1000);
render();

</script>

</body>
</html>
