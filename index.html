<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
  
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
  margin: 0;
  padding: 15px;
}

/* Überschriften */
h1, h2 {
  text-align: center;
}

/* Input */
input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

/* Buttons global */
button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

/* große Hauptbuttons */
.big-btn {
  width: 100%;
  margin-top: 5px;
}

/* Projektkarten */
.project {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-top: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Button Farben */
.start { background: #34c759; color: white; }
.stop { background: #ff3b30; color: white; }
.select { background: #0a84ff; color: white; }

/* Status */
.running {
  border: 2px solid #34c759;
}

.selected {
  border: 2px solid #0a84ff;
}

/* Sessions */
.session {
  font-size: 13px;
  color: gray;
  padding-left: 5px;
}
#dashboard {
  border: 2px solid #0a84ff;
}
</style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>
<div id="dashboard" style="
  background:white;
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
"></div>
  
<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<h2>🧑‍💻 Arbeitsmodus</h2>

<button onclick="startWork()" class="start big-btn">▶️ Start Arbeit</button>
<button onclick="pauseWork()" class="big-btn">⏸ Pause</button>
<button onclick="stopWork()" class="stop big-btn">⏹ Feierabend</button>

<div id="workInfo" style="text-align:center; margin-top:10px;"></div>


<script>
let activeProject = JSON.parse(localStorage.getItem("activeProject")) || null;

let projects;
try {
  projects = JSON.parse(localStorage.getItem("projects")) || [];
} catch (e) {
  projects = [];
}
  
let work;
try {
  work = JSON.parse(localStorage.getItem("work")) || {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
} catch (e) {
  work = {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
}
  
function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
  localStorage.setItem("work", JSON.stringify(work));
  localStorage.setItem("activeProject", JSON.stringify(activeProject));
  render();
}

// ✅ Projekte

function addProject() {
  alert("button geht");
  let name = document.getElementById("projectInput").value;
  if (!name) return;

  projects.push({
    name,
    sessions: [],
    running: false,
    startTime: null
  });

  document.getElementById("projectInput").value = "";
  save();
}

function selectProject(i) {
  // aktuellen stoppen wenn läuft
  if (activeProject !== null) {
    stopTimer(activeProject);
  }

  activeProject = i;

  // wenn Arbeitsmodus läuft → direkt starten
  if (work.running) {
    startTimer(i);
  }

  save();
}
  
function editProject(i) {
  let name = prompt("Neuer Name:", projects[i].name);
  if (name) {
    projects[i].name = name;
    save();
  }
}

function deleteProject(i) {
  if (!confirm("Wirklich löschen?")) return;
  projects.splice(i, 1);
  save();
}

// ✅ Timer

function stopAll() {
  projects.forEach(p => {
    if (p.running) {
      p.sessions.push({
        start: p.startTime,
        end: Date.now()
      });
      p.running = false;
      p.startTime = null;
    }
  });
}

function startTimer(i) {
  stopAll();

  let p = projects[i];
  p.running = true;
  p.startTime = Date.now();

  save();
}

function stopTimer(i) {
  let p = projects[i];
  if (!p.running) return;

  p.sessions.push({
    start: p.startTime,
    end: Date.now()
  });

  p.running = false;
  p.startTime = null;

  save();
}

// ✅ Arbeitsmodus
function startWork() {
  if (work.running) return;

  work.running = true;
  work.paused = false;
  work.start = Date.now();

  // wenn Projekt gewählt → starten
  if (activeProject !== null) {
    startTimer(activeProject);
  }
  
  save();
}

function pauseWork() {
  if (!work.running) return;

  work.total += Date.now() - work.start;
  work.running = false;
  work.paused = true;

  if (activeProject !== null) {
    stopTimer(activeProject);
  }
 
  save();
}

function stopWork() {
  if (work.running) {
    work.total += Date.now() - work.start;
  }

 if (activeProject !== null) {
    stopTimer(activeProject);
  }

  work.running = false;
  work.paused = false;
  work.start = null;

  save();
}

// ✅ Helpers

function format(ms) {
  let sec = Math.floor(ms / 1000);
  let min = Math.floor(sec / 60);
  let h = Math.floor(min / 60);
  return `${h}h ${min % 60}m ${sec % 60}s`;
}

function formatTime(ts) {
  let d = new Date(ts);
  return d.toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getTotal(p) {
  let total = 0;

  p.sessions.forEach(s => {
    total += s.end - s.start;
  });

  if (p.running) {
    total += Date.now() - p.startTime;
  }

  return total;
}

// ✅ Render

function render() {
  let dashboard = document.getElementById("dashboard");
  let container = document.getElementById("projects");
  let workInfo = document.getElementById("workInfo");

  container.innerHTML = "";

  projects.forEach((p, i) => {
    let div = document.createElement("div");

let runningClass = p.running ? "running" : "";
let selectedClass = activeProject === i ? "selected" : "";

let sessionsHtml = "";

p.sessions.slice(-3).forEach(s => {
  sessionsHtml += `
    <div class="session">
      ${formatTime(s.start)} – ${formatTime(s.end)}
    </div>
  `;
});

div.innerHTML = `
  <strong style="font-size:18px">${p.name}</strong><br>
  <div style="margin:5px 0">
    ⏱ ${format(getTotal(p))}
  </div>

  <button class="select big-btn" onclick="selectProject(${i})">
    ${activeProject === i ? "✅ ausgewählt" : "🎯 auswählen"}
  </button>

  <button class="start big-btn" onclick="startTimer(${i})">
    ▶️ Start
  </button>

  <button class="stop big-btn" onclick="stopTimer(${i})">
    ⏹ Stop
  </button>

  ${sessionsHtml}

  <div style="margin-top:10px;">
    <button onclick="editProject(${i})">✏️</button>
    <button onclick="deleteProject(${i})">🗑️</button>
  </div>
`;
div.className = `project ${runningClass} ${selectedClass}`;
    container.appendChild(div);
  });

  let total = work.total;

  if (work.running) {
    total += Date.now() - work.start;
  }

  workInfo.innerHTML = `Gesamt Arbeitszeit: ${format(total)}`;
  
  let activeName = "Kein Projekt gewählt";
  let status = "⏸️ Pause";
  let workTime = work.total;
  
  // aktuelles Projekt finden
  if (activeProject !== null && projects[activeProject]) {
    activeName = projects[activeProject].name;
  }
  
  // Status bestimmen
  if (work.running) {
    status = "🟢 läuft";
    workTime += Date.now() - work.start;
  } else if (work.paused) {
    status = "⏸️ pausiert";
  }
  
  // Dashboard anzeigen
  dashboard.innerHTML = `
    <div style="font-size:18px;"><strong>🎯 ${activeName}</strong></div>
    <div style="margin-top:5px;">${status}</div>
    <div style="font-size:22px; margin-top:8px;">
      ${format(workTime)}
    </div>
  `;

  
}

// ✅ Start
setInterval(render, 1000);
render();

</script>

</body>
</html>
