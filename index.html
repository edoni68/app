<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine Notizen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a84ff">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      margin: 0;
      padding: 20px;
      background: #f2f2f7;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0a84ff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: white;
      margin-bottom: 8px;
      padding: 12px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: transparent;
      color: red;
      border: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>ð Notizen</h1>

<input id="noteInput" placeholder="Neue Notiz..." />
<button onclick="addNote()">Speichern</button>

<ul id="notesList"></ul>

<script>
  let notes = JSON.parse(localStorage.getItem("notes")) || [];

  function renderNotes() {
    const list = document.getElementById("notesList");
    list.innerHTML = "";

    notes.forEach((note, index) => {
      const li = document.createElement("li");
      li.innerHTML = `
        ${note}
        <button class="delete" onclick="deleteNote(${index})">â</button>
      `;
      list.appendChild(li);
    });
  }

  function addNote() {
    const input = document.getElementById("noteInput");
    if (!input.value) return;

    notes.push(input.value);
    localStorage.setItem("notes", JSON.stringify(notes));
    input.value = "";
    renderNotes();
  }

  function deleteNote(i) {
    notes.splice(i, 1);
    localStorage.setItem("notes", JSON.stringify(notes));
    renderNotes();
  }

  renderNotes();

  // Service Worker registrieren (Offline)
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
