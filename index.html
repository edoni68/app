<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
  
<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  padding: 20px;
}

.project {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

.start { background: #34c759; color: white; }
.stop { background: #ff3b30; color: white; }
.active { outline: 3px solid #000; }

.small { font-size: 12px; color: gray; }
</style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>

<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<h2>🧑‍💻 Arbeitsmodus</h2>
<button onclick="startWork()" class="start">Start Arbeit</button>
<button onclick="pauseWork()">Pause</button>
<button onclick="stopWork()" class="stop">Feierabend</button>

<div id="workInfo"></div>

<script>

let projects = JSON.parse(localStorage.getItem("projects")) || [];
let work = JSON.parse(localStorage.getItem("work")) || {
  running: false,
  paused: false,
  start: null,
  total: 0
};

function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
  localStorage.setItem("work", JSON.stringify(work));
  render();
}

// ✅ Projekte

function addProject() {
  let name = document.getElementById("projectInput").value;
  if (!name) return;

  projects.push({
    name,
    sessions: [],
    running: false,
    startTime: null
  });

  document.getElementById("projectInput").value = "";
  save();
}

function editProject(i) {
  let name = prompt("Neuer Name:", projects[i].name);
  if (name) {
    projects[i].name = name;
    save();
  }
}

function deleteProject(i) {
  if (!confirm("Wirklich löschen?")) return;
  projects.splice(i, 1);
  save();
}

// ✅ Timer

function stopAll() {
  projects.forEach(p => {
    if (p.running) {
      p.sessions.push({
        start: p.startTime,
        end: Date.now()
      });
      p.running = false;
      p.startTime = null;
    }
  });
}

function startTimer(i) {
  stopAll();

  let p = projects[i];
  p.running = true;
  p.startTime = Date.now();

  save();
}

function stopTimer(i) {
  let p = projects[i];
  if (!p.running) return;

  p.sessions.push({
    start: p.startTime,
    end: Date.now()
  });

  p.running = false;
  p.startTime = null;

  save();
}

// ✅ Arbeitsmodus

function startWork() {
  if (work.running) return;

  work.running = true;
  work.paused = false;
  work.start = Date.now();

  save();
}

function pauseWork() {
  if (!work.running) return;

  work.total += Date.now() - work.start;
  work.running = false;
  work.paused = true;

  save();
}

function stopWork() {
  if (work.running) {
    work.total += Date.now() - work.start;
  }

  work.running = false;
  work.paused = false;
  work.start = null;

  save();
}
