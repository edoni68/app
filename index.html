<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Zeiterfassung</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system;
      background: #f2f2f7;
      padding: 20px;
      margin: 0;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 5px;
    }

    .start { background: #34c759; color: white; }
    .stop { background: #ff3b30; color: white; }

    .project {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>

<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<script>
  let projects = JSON.parse(localStorage.getItem("projects")) || [];

  function save() {
    localStorage.setItem("projects", JSON.stringify(projects));
    render();
  }

  function addProject() {
    const input = document.getElementById("projectInput");
    if (!input.value) return;

    projects.push({
      name: input.value,
      total: 0,
      running: false,
      startTime: null
    });

    input.value = "";
    save();
  }

  function startTimer(index) {
    const p = projects[index];
    if (p.running) return;

    p.running = true;
    p.startTime = Date.now();
    save();
  }

  function stopTimer(index) {
    const p = projects[index];
    if (!p.running) return;

    p.running = false;
    p.total += Date.now() - p.startTime;
    p.startTime = null;
    save();
  }

  function format(ms) {
    let sec = Math.floor(ms / 1000);
    let min = Math.floor(sec / 60);
    let h = Math.floor(min / 60);

    return `${h}h ${min % 60}m ${sec % 60}s`;
  }

  function render() {
    const container = document.getElementById("projects");
    container.innerHTML = "";

    projects.forEach((p, i) => {
      let current = p.total;

      if (p.running) {
        current += Date.now() - p.startTime;
      }

      const div = document.createElement("div");
      div.className = "project";

      div.innerHTML = `
        <strong>${p.name}</strong><br>
        ⏱ ${format(current)}<br>
        <button class="start" onclick="startTimer(${i})">Start</button>
        <button class="stop" onclick="stopTimer(${i})">Stop</button>
      `;

      container.appendChild(div);
    });
  }

  setInterval(render, 1000);
  render();
</script>

</body>
</html>
