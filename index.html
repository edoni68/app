<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  padding: 20px;
}

.project {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>

<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<script>

let projects = JSON.parse(localStorage.getItem("projects")) || [];

function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
  render();
}

// ✅ NEU: stopAll stabil
function stopAll() {
  projects.forEach(p => {
    if (p.running) {
      p.sessions.push({
        start: p.startTime,
        end: Date.now()
      });
      p.running = false;
      p.startTime = null;
    }
  });
}

// ✅ Projekt erstellen
function addProject() {
  let name = document.getElementById("projectInput").value;
  if (!name) return;

  projects.push({
    name,
    sessions: [],
    running: false,
    startTime: null
  });

  document.getElementById("projectInput").value = "";
  save();
}

// ✅ Start
function startTimer(i) {
  stopAll();

  let p = projects[i];
  p.running = true;
  p.startTime = Date.now();

  save();
}

// ✅ Stop
function stopTimer(i) {
  let p = projects[i];
  if (!p.running) return;

  p.sessions.push({
    start: p.startTime,
    end: Date.now()
  });

  p.running = false;
  p.startTime = null;

  save();
}

// ✅ Zeit berechnen
function getTotal(p) {
  let total = 0;

  p.sessions.forEach(s => {
    total += s.end - s.start;
  });

  if (p.running) {
    total += Date.now() - p.startTime;
  }

  return total;
}

// ✅ Format Dauer
function format(ms) {
  let sec = Math.floor(ms / 1000);
  let min = Math.floor(sec / 60);
  let h = Math.floor(min / 60);
  return `${h}h ${min % 60}m`;
}

// ✅ Format Uhrzeit
function formatTime(ts) {
  let d = new Date(ts);
  return d.toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

// ✅ Render
function render() {
  let container = document.getElementById("projects");
  container.innerHTML = "";

  projects.forEach((p, i) => {
    let div = document.createElement("div");
    div.className = "project";

    let sessionsHtml = "";

    p.sessions.slice(-5).forEach(s => {
      sessionsHtml += `
        <div>
          ${formatTime(s.start)} – ${formatTime(s.end)}
        </div>
      `;
    });

    div.innerHTML = `
      <strong>${p.name}</strong><br>
      Gesamt: ${format(getTotal(p))}<br>

      <button onclick="startTimer(${i})">Start</button>
      <button onclick="stopTimer(${i})">Stop</button>

      ${sessionsHtml}
    `;

    container.appendChild(div);
  });
}

setInterval(render, 1000);
render();

</script>

</body>
</html>
