<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
  
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zeiterfassung">

<meta name="theme-color" content="#0a84ff">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png?v=2">
<link rel="apple-touch-startup-image" href="icon-192.png?v=2">
<link rel="apple-touch-startup-image" href="icon-512.png?v=2">
  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
  margin: 0;
  padding: 15px;
}

/* Überschriften */
h1, h2 {
  text-align: center;
}

/* Input */
input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

/* Buttons global */
button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

/* große Hauptbuttons */
.big-btn {
  width: 100%;
  margin-top: 5px;
}

/* Projektkarten */
.project {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-top: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Button Farben */
.start { background: #34c759; color: white; }
.stop { background: #ff3b30; color: white; }
.select { background: #0a84ff; color: white; }

select {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: white;
  appearance: none;
  -webkit-appearance: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* Pfeil rechts */
.select-wrapper {
  position: relative;
}

.select-wrapper::after {
  content: "⌄";
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: #555;
}
select:focus {
  outline: 2px solid #0a84ff;
}
  
/* Status */
.running {
  border: 2px solid #34c759;
}

.selected {
  border: 2px solid #0a84ff;
}

/* Sessions */
.session {
  font-size: 13px;
  color: gray;
  padding-left: 5px;
}
#dashboard {
  position: sticky;
  top: 0;
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  z-index: 10;
}

.dashboard-running {
  border: 3px solid #34c759;
}

.dashboard-paused {
  border: 3px solid #ff9500;
}

.dashboard-idle {
  border: 3px solid #ff3b30;
}

#reportToday, #reportWeek {
  background: white;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.small-btn {
  font-size: 12px;
  padding: 6px 10px;
  background: transparent;
  color: gray;
}
  
.export-row {
  display: flex;
  gap: 5px;
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.btn-row button {
  flex: 1;
}

/* kleinere Buttons für Projekte */
.small-btn2 {
  font-size: 14px;
  padding: 10px;
  border-radius: 12px;
}

/* hover press effekt */
button:active {
  transform: scale(0.97);
  opacity: 0.9;
}
  
</style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>
  
<div id="dashboard"></div>
  
<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<h2>🧑‍💻 Arbeitsmodus</h2>

<button onclick="startWork()" class="start big-btn">▶️ Start Arbeit</button>
<button onclick="pauseWork()" class="big-btn">⏸ Pause</button>
<button onclick="stopWork()" class="stop big-btn">⏹ Feierabend</button>

<div id="workInfo" style="text-align:center; margin-top:10px;"></div>
<h2>📊 Report</h2>

<div id="reportToday"></div>
<div id="reportWeek" style="margin-top:10px;"></div>
<div id="reportMonth" style="margin-top:10px;"></div>
<h2>📊 Diagramm</h2>
<canvas id="workChart" style="margin-top:10px;"></canvas>
<h2>📊 Projekte</h2>
<canvas id="projectChart" style="margin-top:10px;"></canvas>
  
<div style="font-size:13px; margin-top:10px; color:gray;">
  Export Projekt
</div>
  
<div class="export-row" style="margin-top:10px;">
  <button onclick="exportCSV('today')" class="big-btn">📤 Heute</button>
  <button onclick="exportCSV('week')" class="big-btn">📤 Woche</button>
  <button onclick="exportCSV('all')" class="big-btn">📤 Alles</button>
</div>

<div class="select-wrapper" style="margin-top:10px;margin-bottom:10px;">
  <select id="exportProject" onchange="saveExportSelection()">
    <option value="all">Alle Projekte</option>
  </select>
</div>

<script>
let lastChartUpdate = 0;
let chartInstance = null;
let projectChartInstance = null;
let activeProject = JSON.parse(localStorage.getItem("activeProject")) || null;
let selectedExportProject = localStorage.getItem("selectedExportProject") || "all";
let lastWorkDate = localStorage.getItem("lastWorkDate") || null;
let projects;
let workHistory;
try {
  workHistory = JSON.parse(localStorage.getItem("workHistory")) || {};
} catch (e) {
  workHistory = {};
}
let work;
try {
  work = JSON.parse(localStorage.getItem("work")) || {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
} catch (e) {
  work = {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
}  
let today = new Date().toDateString();

if (lastWorkDate !== today) {
  work.total = 0;
  work.running = false;
  work.paused = false;
  work.start = null;

  lastWorkDate = today;
  localStorage.setItem("lastWorkDate", today);
}

try {
  projects = JSON.parse(localStorage.getItem("projects")) || [];
} catch (e) {
  projects = [];
}
    
function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
  localStorage.setItem("work", JSON.stringify(work));
  localStorage.setItem("workHistory", JSON.stringify(workHistory));
  localStorage.setItem("activeProject", JSON.stringify(activeProject));
  render();
}

// ✅ Projekte

function addProject() {
  // alert("button geht");
  let name = document.getElementById("projectInput").value;
  if (!name) return;

  projects.push({
    name,
    sessions: [],
    running: false,
    startTime: null
  });

  document.getElementById("projectInput").value = "";
  save();
}

function selectProject(i) {
  // aktuellen stoppen wenn läuft
  //if (activeProject !== null) {
  if (activeProject !== null && activeProject !== i) {
    stopTimer(activeProject);
  }

  activeProject = i;

  // wenn Arbeitsmodus läuft → direkt starten
  if (work.running) {
    startTimer(i);
  }

  save();
}
  
function editProject(i) {
  let name = prompt("Neuer Name:", projects[i].name);
  if (name) {
    projects[i].name = name;
    save();
  }
}

function deleteProject(i) {
  if (!confirm("Wirklich löschen?")) return;
  projects.splice(i, 1);
  save();
}

// ✅ Timer

function stopAll() {
  projects.forEach(p => {
    if (p.running) {
      p.sessions.push({
        start: p.startTime,
        end: Date.now()
      });
      p.running = false;
      p.startTime = null;
    }
  });
}

function startTimer(i) {
  let p = projects[i];

  // ✅ Projekt automatisch auswählen
  activeProject = i;

  // ✅ WICHTIG: Arbeitsmodus starten, wenn nicht aktiv
  if (!work.running) {
    startWork();
    return;
  }

  // wenn dieses Projekt schon läuft → nichts tun
  if (p.running) {
    save();
    return;
  }

  // andere stoppen
  projects.forEach((proj, index) => {
    if (proj.running && index !== i) {
      proj.sessions.push({
        start: proj.startTime,
        end: Date.now()
      });
      proj.running = false;
      proj.startTime = null;
    }
  });

  // dieses starten
  p.running = true;
  p.startTime = Date.now();

  save();
}

function stopTimer(i) {
  let p = projects[i];

  if (!p.running || !p.startTime) return;

  p.sessions.push({
    start: p.startTime,
    end: Date.now()
  });

  p.running = false;
  p.startTime = null;

  save();
}

// ✅ Arbeitsmodus
function startWork() {

  if (work.running) return;

  let today = getTodayKey();

  // Eintrag anlegen wenn nicht vorhanden
  if (!workHistory[today]) {
    workHistory[today] = { total: 0 };
  }

  work.running = true;
  work.paused = false;
  work.start = Date.now();

  // wenn Projekt gewählt → starten
  if (activeProject !== null) {
    startTimer(activeProject);
  }
  
  save();
}

function pauseWork() {
  if (!work.running) return;

  let today = getTodayKey();

  workHistory[today].total += Date.now() - work.start;

  work.running = false;
  work.paused = true;

  if (activeProject !== null) {
    stopTimer(activeProject);
  }

  save();
}

function stopWork() {
  let today = getTodayKey();

  if (work.running) {
    workHistory[today].total += Date.now() - work.start;
  }

  if (activeProject !== null) {
    stopTimer(activeProject);
  }

  work.running = false;
  work.paused = false;
  work.start = null;

  save();
}


// ✅ Helpers

function format(ms) {
  let sec = Math.floor(ms / 1000);
  let min = Math.floor(sec / 60);
  let h = Math.floor(min / 60);
  return `${h}h ${min % 60}m ${sec % 60}s`;
}

function formatTime(ts) {
  let d = new Date(ts);
  return d.toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getTotal(p) {
  let total = 0;

  p.sessions.forEach(s => {
    total += s.end - s.start;
  });

  if (p.running) {
    total += Date.now() - p.startTime;
  }

  return total;
}

function isToday(ts) {
  let d = new Date(ts);
  let now = new Date();

  return d.toDateString() === now.toDateString();
}

function isThisWeek(ts) {
  let d = new Date(ts);
  let now = new Date();

  let firstDay = new Date(now.setDate(now.getDate() - now.getDay()));
  let lastDay = new Date(firstDay);
  lastDay.setDate(firstDay.getDate() + 6);

  return d >= firstDay && d <= lastDay;
}

function isThisMonth(ts) {
  let d = new Date(ts);
  let now = new Date();

  return d.getMonth() === now.getMonth() &&
         d.getFullYear() === now.getFullYear();
}

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}
  
// Projekt abwählen
function clearProject() {

  // laufendes Projekt stoppen
  if (activeProject !== null) {
    stopTimer(activeProject);
  }

  activeProject = null;

  save();
}  

function saveExportSelection() {
  let value = document.getElementById("exportProject").value;
  localStorage.setItem("selectedExportProject", value);
  selectedExportProject = value;
}

  
// ✅ Render
function render() {

  let container = document.getElementById("projects");
  let workInfo = document.getElementById("workInfo");

  container.innerHTML = "";

  // export dropdown füllen
  let select = document.getElementById("exportProject");

  // Auswahl merken (wenn gerade geändert)
  
  // KEIN Speichern hier!!
  let currentValue = selectedExportProject;

  // dropdown bauen
  select.innerHTML = `<option value="all">Alle Projekte</option>`;
  
  projects.forEach((p, i) => {
    select.innerHTML += `<option value="${i}">${p.name}</option>`;
  });
  
  // ✅ nur wieder setzen
  select.value = currentValue;

  
  // ✅ Button zum Abwählen
  let noProjectBtn = document.createElement("div");
  
  noProjectBtn.style.textAlign = "right";
  noProjectBtn.style.marginBottom = "5px";
  
  noProjectBtn.innerHTML = `
    <button class="small-btn" onclick="clearProject()">
      kein Projekt
    </button>
  `;
  
  container.appendChild(noProjectBtn);
  
  // Projekte
  projects.forEach((p, i) => {
    let div = document.createElement("div");

    let runningClass = p.running ? "running" : "";
    let selectedClass = activeProject === i ? "selected" : "";

    let sessionsHtml = "";

    p.sessions.slice(-10).forEach(s => {
      sessionsHtml += `
        <div class="session">
          ${formatTime(s.start)} – ${formatTime(s.end)}
        </div>
      `;
    });

    div.innerHTML = `
      <strong style="font-size:18px">${p.name}</strong><br>
      <div style="margin:5px 0">
        ⏱ ${format(getTotal(p))}
      </div>

      
 
      <div class="btn-row">
        <button class="select small-btn2" onclick="selectProject(${i})">
          ${activeProject === i ? "✅ ausgewählt" : "🎯 auswählen"}
        </button>
        <button class="start small-btn2" onclick="startTimer(${i})">
          ▶️ Start
        </button>
      
        <button class="stop small-btn2" onclick="stopTimer(${i})">
          ⏹ Stop
        </button>
      </div>

      
      ${sessionsHtml}

      <div style="margin-top:10px;">
        <button onclick="editProject(${i})">✏️</button>
        <button onclick="deleteProject(${i})">🗑️</button>
      </div>
    `;

    div.className = `project ${runningClass} ${selectedClass}`;
    container.appendChild(div);
  });

  // ✅ Arbeitszeit
  let total = work.total;
  if (work.running) {
    total += Date.now() - work.start;
  }
  workInfo.innerHTML = `Gesamt Arbeitszeit: ${format(total)}`;

  // ✅ DASHBOARD
  let dashboard = document.getElementById("dashboard");

  let activeName = "Kein Projekt gewählt";
  let status = "🔴 Kein Projekt";
  let workTime = work.total;
  let stateClass = "dashboard-idle";

  if (work.running && work.start) {
    workTime += Date.now() - work.start;
  }

  if (activeProject !== null && projects[activeProject]) {
    activeName = projects[activeProject].name;
    status = "⏸️ bereit";
  }
  
  //if (activeProject === null) {
   // activeName = "❌ Kein Projekt";
  // }
  
// prüfen ob wirklich ein Projekt läuft
let projectRunning = projects.some(p => p.running);

if (projectRunning) {
  let active = projects.find(p => p.running);

  workTime = getTotal(active);
}
  
if (work.running && projectRunning) {
  status = "🟢 läuft";
  stateClass = "dashboard-running";
} else if (work.running && !projectRunning) {
  status = "⚠️ kein Projekt aktiv";
  stateClass = "dashboard-idle";
}


  dashboard.className = stateClass;

  dashboard.innerHTML = `
    <div style="font-size:20px; font-weight:bold;">
      🎯 ${activeName}
    </div>
    <div>${status}</div>
    <div style="font-size:26px;">
      ${format(workTime)}
    </div>
    
    <div style="margin-top:10px;">
      <button onclick="startWork()" class="start big-btn">▶️</button>
      <button onclick="pauseWork()" class="big-btn">⏸</button>
      <button onclick="stopWork()" class="stop big-btn">⏹</button>
    </div>
  `;

  // ✅ REPORT
  let reportTodayEl = document.getElementById("reportToday");
  let reportWeekEl = document.getElementById("reportWeek");

  let todayTotals = {};
  let weekTotals = {};

  projects.forEach(p => {
    p.sessions.forEach(s => {
      let duration = s.end - s.start;

      if (isToday(s.start)) {
        todayTotals[p.name] = (todayTotals[p.name] || 0) + duration;
      }

      if (isThisWeek(s.start)) {
        weekTotals[p.name] = (weekTotals[p.name] || 0) + duration;
      }
    });
  });

// Heute
let todayHtml = "<strong>Heute:</strong><br>";
let todaySum = 0;

// Projektzeiten
for (let name in todayTotals) {
  todayHtml += `${name}: ${format(todayTotals[name])}<br>`;
  todaySum += todayTotals[name];
}

// ✅ Arbeitszeit korrekt berechnen
let todayKey = getTodayKey();
let workToday = workHistory[todayKey] ? workHistory[todayKey].total : 0;

if (work.running && work.start) {
  workToday += Date.now() - work.start;
}

// ✅ Differenz richtig berechnen
let diff = workToday - todaySum;

todayHtml += `<hr>`;
todayHtml += `🧾 Projekte: ${format(todaySum)}<br>`;
todayHtml += `<strong>🧑‍💻 Gesamt Arbeitszeit: ${format(workToday)}</strong>`;

// ✅ nur anzeigen wenn sinnvoll
if (diff > 1000) {
  todayHtml += `<br>⚠️ Ohne Projekt: ${format(diff)}`;
}

reportTodayEl.innerHTML = todayHtml;

// ✅ Woche
let weekHtml = "<strong>Diese Woche:</strong><br>";
let weekSum = 0;

// Projektzeiten
for (let name in weekTotals) {
  weekHtml += `${name}: ${format(weekTotals[name])}<br>`;
  weekSum += weekTotals[name];
}

// ✅ WICHTIG: Arbeitszeit korrekt berechnen
let workWeek = 0;

for (let date in workHistory) {
  if (isThisWeek(new Date(date))) {
    workWeek += workHistory[date].total;
  }
}

if (work.running && work.start && isThisWeek(new Date())) {
  workWeek += Date.now() - work.start;
}

weekHtml += `<hr>`;
weekHtml += `🧾 Projekte: ${format(weekSum)}<br>`;
weekHtml += `<strong>🧑‍💻 Gesamt Arbeitszeit: ${format(workWeek)}</strong>`;
weekHtml += `<br><small>(inkl. laufender Zeit)</small>`;  

reportWeekEl.innerHTML = weekHtml;

// Monat
let reportMonthEl = document.getElementById("reportMonth");

let monthTotals = {};
let monthSum = 0;

// Projekte sammeln
projects.forEach(p => {
  p.sessions.forEach(s => {
    if (isThisMonth(s.start)) {
      let duration = s.end - s.start;
      monthTotals[p.name] = (monthTotals[p.name] || 0) + duration;
      monthSum += duration;
    }
  });
});

// ✅ Arbeitszeit Monat (aus History!)
let workMonth = 0;

for (let date in workHistory) {
  if (isThisMonth(new Date(date))) {
    workMonth += workHistory[date].total;
  }
}

if (work.running && work.start && isThisMonth(new Date())) {
  workMonth += Date.now() - work.start;
}

// HTML bauen
let monthHtml = "<strong>Diesen Monat:</strong><br>";

for (let name in monthTotals) {
  monthHtml += `${name}: ${format(monthTotals[name])}<br>`;
}

monthHtml += `<hr>`;
monthHtml += `🧾 Projekte: ${format(monthSum)}<br>`;
monthHtml += `<strong>🧑‍💻 Gesamt Arbeitszeit: ${format(workMonth)}</strong>`;

let diffMonth = workMonth - monthSum;
if (diffMonth > 1000) {
  monthHtml += `<br>⚠️ Ohne Projekt: ${format(diffMonth)}`;
}

reportMonthEl.innerHTML = monthHtml;

try {
safeCharts();
} catch (e) {
  console.error("Chart Fehler:", e);
}

  
} // render end

  
// ✅ Start
setInterval(render, 500);
render();

function exportCSV(filter) {

  let rows = [];
  rows.push("Projekt;Start;Ende;Dauer");

  let totalProjectTime = 0;
  //let selectedProjectValue = document.getElementById("exportProject").value;

 // ✅ FIX
 let selectedProject = selectedExportProject === "all"
  ? "all"
  : parseInt(selectedExportProject);


projects.forEach((p, pIndex) => {
  p.sessions.forEach(s => {

    // ✅ Projektfilter
    if (selectedProject !== "all" && selectedProject !== pIndex) return;

    // ✅ Zeitfilter
    if (filter === "today" && !isToday(s.start)) return;
    if (filter === "week" && !isThisWeek(s.start)) return;

    let start = new Date(s.start).toLocaleString("de-DE");
    let end = new Date(s.end).toLocaleString("de-DE");

    let durationMs = s.end - s.start;
    let duration = format(durationMs);

    totalProjectTime += durationMs;

    rows.push(`${p.name};${start};${end};${duration}`);
  });
});

  // ✅ Gesamt-Arbeitszeit berechnen
  let workTotal = work.total;

  if (work.running && work.start) {
    workTotal += Date.now() - work.start;
  }

  // ✅ Filter berücksichtigen (wichtig!)
  if (filter === "today") {
    // nur heutige Arbeitszeit (vereinfacht: alles, wenn heute gestartet)
    if (!isToday(work.start)) workTotal = totalProjectTime;
  }

  if (filter === "week") {
    if (!isThisWeek(work.start)) workTotal = totalProjectTime;
  }

  // ✅ Ohne Projekt berechnen
  let diff = workTotal - totalProjectTime;

  if (diff > 1000) {
    rows.push(`Ohne Projekt;;;${format(diff)}`);
  }

  // ✅ CSV erzeugen
  let csvContent = rows.join("\n");

  let blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  let url = URL.createObjectURL(blob);

  let link = document.createElement("a");
  link.href = url;

  let date = new Date().toISOString().split("T")[0];
  
let namePart = selectedProject === "all"
  ? "alle"
  : projects[selectedProject].name;

link.download = `zeiterfassung_${namePart}_${filter}_${date}.csv`;

  //link.download = `zeiterfassung_${filter}_${date}.csv`;

  link.click();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// Chart  
function renderChart() {
console.log("Chart wird gebaut");
  let ctx = document.getElementById("workChart").getContext("2d");

  let labels = [];
  let data = [];

  // letzten 30 Tage anzeigen
  let days = 30;

  for (let i = days - 1; i >= 0; i--) {
    let d = new Date();
    d.setDate(d.getDate() - i);

    let key = d.toISOString().split("T")[0];

    let label = d.toLocaleDateString("de-DE", {
      weekday: "short"
    });

    let value = workHistory[key] ? workHistory[key].total : 0;

    // Stunden statt ms
    value = Math.round(value / 3600000 * 10) / 10;

    labels.push(label);
    data.push(value);
  }

  // altes Chart zerstören
  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Arbeitszeit (h)",
        data: data,
        backgroundColor: data.map(v => v > 6 ? "#34c759" : "#0a84ff"),
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      plugins: {
  legend: {
    display: false
  },
    tooltip: {
      callbacks: {
        label: ctx => ctx.raw + " Stunden"
      }
    }
  },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            callback: value => value + "h"
          }
        }
      }
    }
  });
}

// Projekt Chart
function renderProjectChart() {

  let ctx = document.getElementById("projectChart").getContext("2d");

  let projectTotals = {};

  // ✅ Zeiten aufsummieren
  projects.forEach(p => {
    let total = 0;

    p.sessions.forEach(s => {
  if (isThisWeek(s.start)) {
    total += s.end - s.start;
  }
});

    if (total > 0) {
      // Stunden umrechnen
      total = Math.round(total / 3600000 * 10) / 10;
      projectTotals[p.name] = total;
    }
  });

  // ✅ sortieren nach Zeit
  let sorted = Object.entries(projectTotals)
    .sort((a, b) => b[1] - a[1]);

  let labels = sorted.map(e => e[0]);
  let data = sorted.map(e => e[1]);

  // alte Instanz entfernen
  if (projectChartInstance) {
    projectChartInstance.destroy();
  }

  projectChartInstance = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: labels,
      datasets: [{
        label: "Stunden",
        data: data,
        backgroundColor: [
          "#0a84ff",
          "#34c759",
          "#ff9500",
          "#ff3b30",
          "#5856d6"
        ],
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          callbacks: {
            label: ctx => ctx.raw + " h"
          }
        }
      },
      scales: {
        x: {
          ticks: {
            autoSkip: false
          }
        },
        y: {
          beginAtZero: true,
          ticks: {
            callback: v => v + "h"
          }
        }
      }
    }
  });
}



function safeCharts() {
  let now = Date.now();
  if (now - lastChartUpdate > 2000) {
    renderChart();
    renderProjectChart();
    lastChartUpdate = now;
  }
}
  
</script>
