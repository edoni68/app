<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
  
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
  margin: 0;
  padding: 15px;
}

/* Überschriften */
h1, h2 {
  text-align: center;
}

/* Input */
input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

/* Buttons global */
button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

/* große Hauptbuttons */
.big-btn {
  width: 100%;
  margin-top: 5px;
}

/* Projektkarten */
.project {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-top: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Button Farben */
.start { background: #34c759; color: white; }
.stop { background: #ff3b30; color: white; }
.select { background: #0a84ff; color: white; }

/* Status */
.running {
  border: 2px solid #34c759;
}

.selected {
  border: 2px solid #0a84ff;
}

/* Sessions */
.session {
  font-size: 13px;
  color: gray;
  padding-left: 5px;
}
#dashboard {
  position: sticky;
  top: 0;
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  z-index: 10;
}

.dashboard-running {
  border: 3px solid #34c759;
}

.dashboard-paused {
  border: 3px solid #ff9500;
}

.dashboard-idle {
  border: 3px solid #ff3b30;
}

#reportToday, #reportWeek {
  background: white;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>⏱️ Zeiterfassung</h1>
  
<div id="dashboard"></div>
  
<input id="projectInput" placeholder="Projektname..." />
<button onclick="addProject()">Projekt hinzufügen</button>

<div id="projects"></div>

<h2>🧑‍💻 Arbeitsmodus</h2>

<button onclick="startWork()" class="start big-btn">▶️ Start Arbeit</button>
<button onclick="pauseWork()" class="big-btn">⏸ Pause</button>
<button onclick="stopWork()" class="stop big-btn">⏹ Feierabend</button>

<div id="workInfo" style="text-align:center; margin-top:10px;"></div>
<h2>📊 Report</h2>

<div id="reportToday"></div>
<div id="reportWeek" style="margin-top:10px;"></div>


<script>
let activeProject = JSON.parse(localStorage.getItem("activeProject")) || null;

let projects;
try {
  projects = JSON.parse(localStorage.getItem("projects")) || [];
} catch (e) {
  projects = [];
}
  
let work;
try {
  work = JSON.parse(localStorage.getItem("work")) || {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
} catch (e) {
  work = {
    running: false,
    paused: false,
    start: null,
    total: 0
  };
}
  
function save() {
  localStorage.setItem("projects", JSON.stringify(projects));
  localStorage.setItem("work", JSON.stringify(work));
  localStorage.setItem("activeProject", JSON.stringify(activeProject));
  render();
}

// ✅ Projekte

function addProject() {
  // alert("button geht");
  let name = document.getElementById("projectInput").value;
  if (!name) return;

  projects.push({
    name,
    sessions: [],
    running: false,
    startTime: null
  });

  document.getElementById("projectInput").value = "";
  save();
}

function selectProject(i) {
  // aktuellen stoppen wenn läuft
  if (activeProject !== null) {
    stopTimer(activeProject);
  }

  activeProject = i;

  // wenn Arbeitsmodus läuft → direkt starten
  if (work.running) {
    startTimer(i);
  }

  save();
}
  
function editProject(i) {
  let name = prompt("Neuer Name:", projects[i].name);
  if (name) {
    projects[i].name = name;
    save();
  }
}

function deleteProject(i) {
  if (!confirm("Wirklich löschen?")) return;
  projects.splice(i, 1);
  save();
}

// ✅ Timer

function stopAll() {
  projects.forEach(p => {
    if (p.running) {
      p.sessions.push({
        start: p.startTime,
        end: Date.now()
      });
      p.running = false;
      p.startTime = null;
    }
  });
}

function startTimer(i) {
  let p = projects[i];

  // wenn dieses Projekt schon läuft → nichts tun
  if (p.running) return;

  // andere stoppen
  projects.forEach((proj, index) => {
    if (proj.running && index !== i) {
      proj.sessions.push({
        start: proj.startTime,
        end: Date.now()
      });
      proj.running = false;
      proj.startTime = null;
    }
  });

  // dieses starten
  p.running = true;
  p.startTime = Date.now();

  save();
}

function stopTimer(i) {
  let p = projects[i];

  if (!p.running || !p.startTime) return;

  p.sessions.push({
    start: p.startTime,
    end: Date.now()
  });

  p.running = false;
  p.startTime = null;

  save();
}

// ✅ Arbeitsmodus
function startWork() {
  if (work.running) return;

  work.running = true;
  work.paused = false;
  work.start = Date.now();

  // wenn Projekt gewählt → starten
  if (activeProject !== null) {
    startTimer(activeProject);
  }
  
  save();
}

function pauseWork() {
  if (!work.running) return;

  work.total += Date.now() - work.start;
  work.running = false;
  work.paused = true;

  if (activeProject !== null) {
    stopTimer(activeProject);
  }
 
  save();
}

function stopWork() {
  if (work.running) {
    work.total += Date.now() - work.start;
  }

 if (activeProject !== null) {
    stopTimer(activeProject);
  }

  work.running = false;
  work.paused = false;
  work.start = null;

  save();
}

// ✅ Helpers

function format(ms) {
  let sec = Math.floor(ms / 1000);
  let min = Math.floor(sec / 60);
  let h = Math.floor(min / 60);
  return `${h}h ${min % 60}m ${sec % 60}s`;
}

function formatTime(ts) {
  let d = new Date(ts);
  return d.toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getTotal(p) {
  let total = 0;

  p.sessions.forEach(s => {
    total += s.end - s.start;
  });

  if (p.running) {
    total += Date.now() - p.startTime;
  }

  return total;
}

function isToday(ts) {
  let d = new Date(ts);
  let now = new Date();

  return d.toDateString() === now.toDateString();
}

function isThisWeek(ts) {
  let d = new Date(ts);
  let now = new Date();

  let firstDay = new Date(now.setDate(now.getDate() - now.getDay()));
  let lastDay = new Date(firstDay);
  lastDay.setDate(firstDay.getDate() + 6);

  return d >= firstDay && d <= lastDay;
}

// Projekt abwählen
function clearProject() {

  // laufendes Projekt stoppen
  if (activeProject !== null) {
    stopTimer(activeProject);
  }

  activeProject = null;

  save();
}  
  
// ✅ Render
function render() {

  let container = document.getElementById("projects");
  let workInfo = document.getElementById("workInfo");

  container.innerHTML = "";

  // ✅ Button zum Abwählen
  let noProjectBtn = document.createElement("div");
  noProjectBtn.innerHTML = `
    <button class="big-btn" onclick="clearProject()">
      ❌ Kein Projekt aktiv
    </button>
  `;
  container.appendChild(noProjectBtn);
  
  // Projekte
  projects.forEach((p, i) => {
    let div = document.createElement("div");

    let runningClass = p.running ? "running" : "";
    let selectedClass = activeProject === i ? "selected" : "";

    let sessionsHtml = "";

    p.sessions.slice(-10).forEach(s => {
      sessionsHtml += `
        <div class="session">
          ${formatTime(s.start)} – ${formatTime(s.end)}
        </div>
      `;
    });

    div.innerHTML = `
      <strong style="font-size:18px">${p.name}</strong><br>
      <div style="margin:5px 0">
        ⏱ ${format(getTotal(p))}
      </div>

      <button class="select big-btn" onclick="selectProject(${i})">
        ${activeProject === i ? "✅ ausgewählt" : "🎯 auswählen"}
      </button>

      <button class="start big-btn" onclick="startTimer(${i})">▶️ Start</button>
      <button class="stop big-btn" onclick="stopTimer(${i})">⏹ Stop</button>

      ${sessionsHtml}

      <div style="margin-top:10px;">
        <button onclick="editProject(${i})">✏️</button>
        <button onclick="deleteProject(${i})">🗑️</button>
      </div>
    `;

    div.className = `project ${runningClass} ${selectedClass}`;
    container.appendChild(div);
  });

  // ✅ Arbeitszeit
  let total = work.total;
  if (work.running) {
    total += Date.now() - work.start;
  }
  workInfo.innerHTML = `Gesamt Arbeitszeit: ${format(total)}`;

  // ✅ DASHBOARD
  let dashboard = document.getElementById("dashboard");

  let activeName = "Kein Projekt gewählt";
  let status = "🔴 Kein Projekt";
  let workTime = work.total;
  let stateClass = "dashboard-idle";

  if (work.running && work.start) {
    workTime += Date.now() - work.start;
  }

  if (activeProject !== null && projects[activeProject]) {
    activeName = projects[activeProject].name;
    status = "⏸️ bereit";
  }
  
  if (activeProject === null) {
    activeName = "❌ Kein Projekt";
  }
  
// prüfen ob wirklich ein Projekt läuft
let projectRunning = projects.some(p => p.running);

if (work.running && projectRunning) {
  status = "🟢 läuft";
  stateClass = "dashboard-running";
} else if (work.running && !projectRunning) {
  status = "⚠️ kein Projekt aktiv";
  stateClass = "dashboard-idle";
}


  dashboard.className = stateClass;

  dashboard.innerHTML = `
    <div style="font-size:20px; font-weight:bold;">
      🎯 ${activeName}
    </div>
    <div>${status}</div>
    <div style="font-size:26px;">
      ${format(workTime)}
    </div>
    
    <div style="margin-top:10px;">
      <button onclick="startWork()" class="start big-btn">▶️</button>
      <button onclick="pauseWork()" class="big-btn">⏸</button>
      <button onclick="stopWork()" class="stop big-btn">⏹</button>
    </div>
  `;

  // ✅ REPORT
  let reportTodayEl = document.getElementById("reportToday");
  let reportWeekEl = document.getElementById("reportWeek");

  let todayTotals = {};
  let weekTotals = {};

  projects.forEach(p => {
    p.sessions.forEach(s => {
      let duration = s.end - s.start;

      if (isToday(s.start)) {
        todayTotals[p.name] = (todayTotals[p.name] || 0) + duration;
      }

      if (isThisWeek(s.start)) {
        weekTotals[p.name] = (weekTotals[p.name] || 0) + duration;
      }
    });
  });

// Heute
let todayHtml = "<strong>Heute:</strong><br>";
let todaySum = 0;
let diff = workToday - todaySum;
  
// Projektzeiten
for (let name in todayTotals) {
  todayHtml += `${name}: ${format(todayTotals[name])}<br>`;
  todaySum += todayTotals[name];
}

// ✅ WICHTIG: Arbeitszeit korrekt berechnen
let workToday = work.total;

// laufende Zeit dazu
if (work.running && work.start) {
  workToday += Date.now() - work.start;
}

todayHtml += `<hr>`;
todayHtml += `🧾 Projekte: ${format(todaySum)}<br>`;
todayHtml += `<strong>🧑‍💻 Gesamt Arbeitszeit: ${format(workToday)}</strong>`;

if (diff > 0) {
  todayHtml += `<br>⚠️ Ohne Projekt: ${format(diff)}`;
}

  
reportTodayEl.innerHTML = todayHtml;

// ✅ Woche
let weekHtml = "<strong>Diese Woche:</strong><br>";
let weekSum = 0;

// Projektzeiten
for (let name in weekTotals) {
  weekHtml += `${name}: ${format(weekTotals[name])}<br>`;
  weekSum += weekTotals[name];
}

// ✅ WICHTIG: Arbeitszeit korrekt berechnen
let workWeek = work.total;

// laufende Zeit
if (work.running && work.start) {
  workWeek += Date.now() - work.start;
}

weekHtml += `<hr>`;
weekHtml += `🧾 Projekte: ${format(weekSum)}<br>`;
weekHtml += `<strong>🧑‍💻 Gesamt Arbeitszeit: ${format(workWeek)}</strong>`;
weekHtml += `<br><small>(inkl. laufender Zeit)</small>`;  

reportWeekEl.innerHTML = weekHtml;
  
}

  
// ✅ Start
setInterval(render, 500);
render();

</script>

</body>
</html>
